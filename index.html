<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandma's Voicemails</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-base">
        <header class="retro-header">
            <h1>Grannyline</h1>
            <p class="subtitle">A collection of voicemails from our grannums</p>
        </header>

        <!-- Handset Display Area -->
        <div class="handset-display">
            <div class="screen-border">
                <div class="screen-content">
                    <div class="status-bar">
                        <span class="time" id="currentTime"></span>
                    </div>
                    
                    <div class="message-area">
                        <div class="message-icon">📞</div>
                        <div class="message-text" id="messageText">
                            Press a button below to hear a message...
                        </div>
                    </div>

                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>

                    <audio id="audioPlayer" preload="none"></audio>
                </div>
            </div>
        </div>

        <!-- Playback Controls (Integrated into handset) -->
        <div class="handset-controls">
            <button id="prevRecordingBtn" class="control-btn" title="Previous Recording">⏮</button>
            <button id="playPauseBtn" class="control-btn main-control" title="Play/Pause">▶</button>
            <button id="nextRecordingBtn" class="control-btn" title="Next Recording">⏭</button>
        </div>

        <!-- Numeric Keypad -->
        <div class="keypad">
            <div class="keypad-grid">
                <button class="key" data-key="1">1</button>
                <button class="key" data-key="2">2</button>
                <button class="key" data-key="3">3</button>
                <button class="key" data-key="4">4</button>
                <button class="key" data-key="5">5</button>
                <button class="key" data-key="6">6</button>
                <button class="key" data-key="7">7</button>
                <button class="key" data-key="8">8</button>
                <button class="key" data-key="9">9</button>
                <button class="key" data-key="*">*</button>
                <button class="key" data-key="0">0</button>
                <button class="key" data-key="#">#</button>
            </div>
        </div>

        <footer class="retro-footer">
            <p>Thinking of you grannums ♥</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
